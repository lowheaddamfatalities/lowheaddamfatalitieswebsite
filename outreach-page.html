<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach | Low Head Dam Safety</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="navbar-placeholder"></div>

<div class="page-content">

<section class="email-signup">
    <h2>Sign Up for Safety Notices</h2>

    <form>
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
    </form>
</section>


<section class="products">

    <h2>Order Safety Merchandise</h2>

    <div class="product-grid">

        <div class="product">
            <img src="https://raw.githubusercontent.com/Paige8973/LowHeadDamFatalitiesTestSite/main/LHD%2CT-shirt.png" alt="T-Shirt">
            <p>T-Shirts</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://raw.githubusercontent.com/Paige8973/LowHeadDamFatalitiesTestSite/main/DLTFHYD(Final).png" alt="Don't Let the Flow Hold You Down">
            <p>Don't Let the Flow Hold You Down</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://raw.githubusercontent.com/Paige8973/LowHeadDamFatalitiesTestSite/main/CCCD(circle).jpg" alt="Circling Current, Certain Danger">
            <p>Circling Current, Certain Danger</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://raw.githubusercontent.com/Paige8973/LowHeadDamFatalitiesTestSite/main/BTBW(SPIKY).png" alt="Beware the Backwash">
            <p>Beware the Backwash</p>
            <button class="cart-btn">Add to Cart</button>
        </div>

    </div>

</section>


<section class="flyer-download">

    <h2>Download Safety Flyer</h2>

    <a class="download-btn"
       href="https://raw.githubusercontent.com/Paige8973/LowHeadDamFatalitiesTestSite/main/LHD%20Flyer%20Draft%201.png"
       download>
       Download Flyer
    </a>

</section>

</div>
<footer>
    <p>© 2025 Low Head Dam Safety Initiative</p>
</footer>

<script src="nav-loader.js"></script>

</body>
</html>
